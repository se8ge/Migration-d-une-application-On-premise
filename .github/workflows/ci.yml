name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root_password
          MYSQL_DATABASE: stocklive_db
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Wait for MySQL
        run: |
          python -c "
          import socket
          import time
          s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
          while s.connect_ex(('127.0.0.1', 3306)) != 0:
              print('Waiting for MySQL...')
              time.sleep(1)
          "

      - name: Run migration tests
        env:
          DATABASE_URL: mysql+pymysql://root:root_password@127.0.0.1:3306/stocklive_db
        run: |
          python scripts/admin/test_migration.py

  build-docker:
    name: Build Docker Image
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and Load Image
        uses: docker/build-push-action@v4
        with:
          context: .
          load: true
          tags: stocklive-api:latest

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'stocklive-api:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  deploy-aws:
    name: Deploy to AWS (CD)
    needs: build-docker
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform -chdir=terraform init

      - name: Terraform Apply (ensure infra is up)
        run: |
          terraform -chdir=terraform apply -auto-approve \
            -var="db_password=${{ secrets.RDS_PASSWORD }}" \
            -var="ssh_cidr=${{ secrets.SSH_ALLOWED_CIDR }}"

      - name: Get EC2 and DB Info
        id: vars
        run: |
          echo "INSTANCE_ID=$(terraform -chdir=terraform output -raw app_server_instance_id)" >> $GITHUB_OUTPUT
          echo "DB_ENDPOINT=$(terraform -chdir=terraform output -raw db_endpoint)" >> $GITHUB_OUTPUT
          echo "RDS_PASSWORD=$(terraform -chdir=terraform output -raw rds_password)" >> $GITHUB_OUTPUT

      - name: Ensure EC2 instance is running and SSM is healthy
        run: |
          INSTANCE_ID="${{ steps.vars.outputs.INSTANCE_ID }}"
          echo "Checking EC2 instance state for $INSTANCE_ID..."
          
          INSTANCE_STATE=$(aws ec2 describe-instances \
            --instance-ids "$INSTANCE_ID" \
            --query "Reservations[0].Instances[0].State.Name" \
            --output text --region eu-west-3)
          echo "Current instance state: $INSTANCE_STATE"
          
          if [ "$INSTANCE_STATE" == "stopped" ]; then
            echo "Instance is stopped. Starting it..."
            aws ec2 start-instances --instance-ids "$INSTANCE_ID" --region eu-west-3
            aws ec2 wait instance-running --instance-ids "$INSTANCE_ID" --region eu-west-3
            echo "Instance started successfully."
          elif [ "$INSTANCE_STATE" == "stopping" ]; then
            echo "Instance is stopping. Waiting for it to stop..."
            aws ec2 wait instance-stopped --instance-ids "$INSTANCE_ID" --region eu-west-3
            echo "Starting instance..."
            aws ec2 start-instances --instance-ids "$INSTANCE_ID" --region eu-west-3
            aws ec2 wait instance-running --instance-ids "$INSTANCE_ID" --region eu-west-3
          elif [ "$INSTANCE_STATE" == "terminated" ] || [ "$INSTANCE_STATE" == "shutting-down" ]; then
            echo "ERROR: Instance is terminated or shutting down! Terraform needs to recreate it."
            exit 1
          fi

          # Now the instance is running. Check SSM status.
          echo "Checking SSM PingStatus..."
          SSM_STATUS=$(aws ssm describe-instance-information \
            --filters "Key=InstanceIds,Values=$INSTANCE_ID" \
            --query "InstanceInformationList[0].PingStatus" \
            --output text --region eu-west-3 2>/dev/null || echo "NotRegistered")
          
          echo "SSM PingStatus: $SSM_STATUS"
          
          if [ "$SSM_STATUS" != "Online" ]; then
            echo "SSM is not Online (Status: $SSM_STATUS). Attempting stop and start to restore connection..."
            aws ec2 stop-instances --instance-ids "$INSTANCE_ID" --region eu-west-3
            echo "Waiting for instance to stop..."
            aws ec2 wait instance-stopped --instance-ids "$INSTANCE_ID" --region eu-west-3
            echo "Starting instance..."
            aws ec2 start-instances --instance-ids "$INSTANCE_ID" --region eu-west-3
            aws ec2 wait instance-running --instance-ids "$INSTANCE_ID" --region eu-west-3
            echo "Instance restarted. Waiting for status checks..."
            aws ec2 wait instance-status-ok --instance-ids "$INSTANCE_ID" --region eu-west-3 || true
          else
            echo "SSM is Online. No reboot/restart needed."
          fi

      - name: Wait for SSM to be ready
        run: |
          echo "Waiting for instance ${{ steps.vars.outputs.INSTANCE_ID }} to register in SSM..."
          for i in {1..40}; do
            STATE=$(aws ssm describe-instance-information --filters "Key=InstanceIds,Values=${{ steps.vars.outputs.INSTANCE_ID }}" --query "InstanceInformationList[0].PingStatus" --output text --region eu-west-3)
            if [ "$STATE" == "Online" ]; then
              echo "Instance is Online in SSM!"
              exit 0
            fi
            echo "Attempt $i: state='$STATE'. Waiting 15s..."
            sleep 15
          done
          echo "Timeout waiting for SSM."
          exit 1

      - name: Deploy to EC2 via AWS SSM
        id: deploy
        run: |
          DEPLOY_CMD=$(cat <<'SSMEOF'
          set -e
          cd /home/ubuntu/app
          if [ ! -d ".git" ]; then
            sudo git clone https://github.com/REPO_PLACEHOLDER.git .
          else
            sudo git fetch origin main && sudo git reset --hard origin/main
          fi
          sudo chown -R ubuntu:ubuntu /home/ubuntu/app
          cat > .env <<ENVEOF
          DATABASE_URL=mysql+pymysql://admin:DB_PASSWORD_PLACEHOLDER@DB_ENDPOINT_PLACEHOLDER/stocklive_db
          MYSQL_ROOT_PASSWORD=DB_PASSWORD_PLACEHOLDER
          MYSQL_PASSWORD=DB_PASSWORD_PLACEHOLDER
          MYSQL_DATABASE=stocklive_db
          MYSQL_USER=admin
          ENVEOF
          sudo curl -fsSL "https://github.com/docker/compose/releases/download/v2.26.1/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose
          sudo /usr/local/bin/docker-compose down --remove-orphans || true
          sudo /usr/local/bin/docker-compose -f monitoring/docker-compose.yml down --remove-orphans || true
          sudo docker system prune -f
          if [ -n "DISCORD_WEBHOOK_PLACEHOLDER" ]; then
            sudo sed -i "s|YOUR_DISCORD_WEBHOOK_URL_HERE|DISCORD_WEBHOOK_PLACEHOLDER|g" monitoring/alertmanager.yml
          fi
          sudo /usr/local/bin/docker-compose up -d --build --force-recreate
          sudo /usr/local/bin/docker-compose -f monitoring/docker-compose.yml up -d --build --force-recreate || true
          echo "Waiting for api container to be healthy..."
          IS_HEALTHY=false
          for i in {1..30}; do
            HEALTH_STATUS=$(sudo docker inspect --format='{{json .State.Health.Status}}' stocklive-api 2>/dev/null || echo "unknown")
            echo "Attempt $i: Container health status is $HEALTH_STATUS"
            if [ "$HEALTH_STATUS" = "\"healthy\"" ] || [ "$HEALTH_STATUS" = "healthy" ]; then
              echo "Container is healthy!"
              IS_HEALTHY=true
              break
            fi
            sleep 10
          done
          
          if [ "$IS_HEALTHY" = "true" ]; then
            echo "Running user creation script..."
            sudo /usr/local/bin/docker-compose exec -T api python scripts/admin/create_user_serge.py
          else
            echo "ERROR: Container api did not become healthy in time!"
            exit 1
          fi
          SSMEOF
          )

          # Substitute placeholders
          DEPLOY_CMD="${DEPLOY_CMD//REPO_PLACEHOLDER/${{ github.repository }}}"
          DEPLOY_CMD="${DEPLOY_CMD//DB_PASSWORD_PLACEHOLDER/${{ steps.vars.outputs.RDS_PASSWORD }}}"
          DEPLOY_CMD="${DEPLOY_CMD//DB_ENDPOINT_PLACEHOLDER/${{ steps.vars.outputs.DB_ENDPOINT }}}"
          DEPLOY_CMD="${DEPLOY_CMD//DISCORD_WEBHOOK_PLACEHOLDER/${{ secrets.DISCORD_WEBHOOK_URL }}}"

          # Use jq to create a safe JSON parameters file to avoid AWS CLI parsing issues
          jq -n --arg cmd "$DEPLOY_CMD" '{"commands": [$cmd]}' > ssm_params.json

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ steps.vars.outputs.INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploying StockLive" \
            --parameters file://ssm_params.json \
            --region eu-west-3 \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"
          echo "COMMAND_ID=$COMMAND_ID" >> $GITHUB_OUTPUT

          # Wait for command to complete
          for i in {1..20}; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ steps.vars.outputs.INSTANCE_ID }}" \
              --region eu-west-3 \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "Attempt $i: SSM command status = $STATUS"
            if [ "$STATUS" == "Success" ]; then
              echo "Deployment command succeeded!"
              break
            elif [ "$STATUS" == "Failed" ] || [ "$STATUS" == "TimedOut" ] || [ "$STATUS" == "Cancelled" ]; then
              echo "Deployment command FAILED with status: $STATUS"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ steps.vars.outputs.INSTANCE_ID }}" \
                --region eu-west-3 \
                --query "StandardErrorContent" --output text
              exit 1
            fi
            sleep 15
          done

      - name: Check Container Status (Diagnostics)
        if: always()
        run: |
          DIAG_ID=$(aws ssm send-command \
            --instance-ids "${{ steps.vars.outputs.INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Diagnostics" \
            --parameters commands=["sudo docker ps -a","sudo /usr/local/bin/docker-compose -f /home/ubuntu/app/docker-compose.yml logs --tail=50 api"] \
            --region eu-west-3 \
            --query "Command.CommandId" \
            --output text)
          sleep 20
          echo "=== Container Status ==="
          aws ssm get-command-invocation \
            --command-id "$DIAG_ID" \
            --instance-id "${{ steps.vars.outputs.INSTANCE_ID }}" \
            --region eu-west-3 \
            --query "StandardOutputContent" --output text || true
          echo "=== Container Errors ==="
          aws ssm get-command-invocation \
            --command-id "$DIAG_ID" \
            --instance-id "${{ steps.vars.outputs.INSTANCE_ID }}" \
            --region eu-west-3 \
            --query "StandardErrorContent" --output text || true
