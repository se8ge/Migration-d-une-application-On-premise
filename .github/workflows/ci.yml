name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root_password
          MYSQL_DATABASE: stocklive_db
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Wait for MySQL
        run: |
          python -c "
          import socket
          import time
          s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
          while s.connect_ex(('127.0.0.1', 3306)) != 0:
              print('Waiting for MySQL...')
              time.sleep(1)
          "

      - name: Run migration tests
        env:
          DATABASE_URL: mysql+pymysql://root:root_password@127.0.0.1:3306/stocklive_db
        run: |
          python scripts/admin/test_migration.py

  build-docker:
    name: Build Docker Image
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and Load Image
        uses: docker/build-push-action@v4
        with:
          context: .
          load: true
          tags: stocklive-api:latest

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'stocklive-api:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  deploy-aws:
    name: Deploy to AWS (CD)
    needs: build-docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform -chdir=terraform init

      - name: Terraform Apply (ensure infra is up)
        run: |
          terraform -chdir=terraform apply -auto-approve \
            -var="db_password=${{ secrets.RDS_PASSWORD }}" \
            -var="ssh_cidr=${{ secrets.SSH_ALLOWED_CIDR }}"

      - name: Get EC2 and DB Info
        id: vars
        run: |
          echo "EC2_IP=$(terraform -chdir=terraform output -raw app_server_public_ip)" >> $GITHUB_OUTPUT
          echo "DB_ENDPOINT=$(terraform -chdir=terraform output -raw db_endpoint)" >> $GITHUB_OUTPUT

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ steps.vars.outputs.EC2_IP }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p ~/app
            cd ~/app
            if [ ! -d ".git" ]; then
              git clone https://github.com/${{ github.repository }}.git .
            else
              git fetch origin main
              git reset --hard origin/main
            fi
            
            # Création du fichier .env
            echo "DATABASE_URL=mysql+pymysql://admin:${{ secrets.RDS_PASSWORD }}@${{ steps.vars.outputs.DB_ENDPOINT }}/inventory" > .env
            echo "MYSQL_ROOT_PASSWORD=${{ secrets.RDS_PASSWORD }}" >> .env
            echo "MYSQL_PASSWORD=${{ secrets.RDS_PASSWORD }}" >> .env
            echo "MYSQL_DATABASE=inventory" >> .env
            echo "MYSQL_USER=admin" >> .env
            
            docker-compose up -d --build
