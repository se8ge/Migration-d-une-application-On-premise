name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root_password
          MYSQL_DATABASE: stocklive_db
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Wait for MySQL
        run: |
          python -c "
          import socket
          import time
          s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
          while s.connect_ex(('127.0.0.1', 3306)) != 0:
              print('Waiting for MySQL...')
              time.sleep(1)
          "

      - name: Run migration tests
        env:
          DATABASE_URL: mysql+pymysql://root:root_password@127.0.0.1:3306/stocklive_db
        run: |
          python scripts/admin/test_migration.py

  build-docker:
    name: Build Docker Image
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and Load Image
        uses: docker/build-push-action@v4
        with:
          context: .
          load: true
          tags: stocklive-api:latest

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'stocklive-api:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  deploy-aws:
    name: Deploy to AWS (CD)
    needs: build-docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform -chdir=terraform init

      - name: Terraform Apply (ensure infra is up)
        run: |
          terraform -chdir=terraform apply -auto-approve \
            -var="db_password=${{ secrets.RDS_PASSWORD }}" \
            -var="ssh_cidr=${{ secrets.SSH_ALLOWED_CIDR }}"

      - name: Get EC2 and DB Info
        id: vars
        run: |
          echo "INSTANCE_ID=$(terraform -chdir=terraform output -raw app_server_instance_id)" >> $GITHUB_OUTPUT
          echo "DB_ENDPOINT=$(terraform -chdir=terraform output -raw db_endpoint)" >> $GITHUB_OUTPUT
          echo "RDS_PASSWORD=$(terraform -chdir=terraform output -raw rds_password)" >> $GITHUB_OUTPUT

      - name: Wait for SSM to be ready
        run: |
          echo "Waiting for instance ${{ steps.vars.outputs.INSTANCE_ID }} to register in SSM..."
          echo "Instances currently managed by SSM:"
          aws ssm describe-instance-information --query "InstanceInformationList[*].{ID:InstanceId,Status:PingStatus,Name:ComputerName}" --output table --region eu-west-3
          
          for i in {1..30}; do
            STATE=$(aws ssm describe-instance-information --filters "Key=InstanceIds,Values=${{ steps.vars.outputs.INSTANCE_ID }}" --query "InstanceInformationList[0].PingStatus" --output text --region eu-west-3)
            if [ "$STATE" == "Online" ]; then
              echo "Instance is Online in SSM!"
              exit 0
            fi
            echo "Attempt $i: Current state for ${{ steps.vars.outputs.INSTANCE_ID }} is '$STATE'. Waiting 15s..."
            sleep 15
          done
          echo "Timeout waiting for SSM. Final check of all instances:"
          aws ssm describe-instance-information --query "InstanceInformationList[*].{ID:InstanceId,Status:PingStatus}" --output table --region eu-west-3
          exit 1

      - name: Deploy to EC2 via AWS SSM
        run: |
          aws ssm send-command \
            --instance-ids "${{ steps.vars.outputs.INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploying StockLive via SSM" \
            --parameters 'commands=[
              "mkdir -p /home/ubuntu/app",
              "cd /home/ubuntu/app",
              "if [ ! -d \".git\" ]; then sudo git clone https://github.com/${{ github.repository }}.git .; else sudo git fetch origin main && sudo git reset --hard origin/main; fi",
              "sudo chown -R ubuntu:ubuntu /home/ubuntu/app",
              "echo \"DATABASE_URL=mysql+pymysql://admin:${{ steps.vars.outputs.RDS_PASSWORD }}@${{ steps.vars.outputs.DB_ENDPOINT }}/stocklive_db\" > .env",
              "echo \"MYSQL_ROOT_PASSWORD=${{ steps.vars.outputs.RDS_PASSWORD }}\" >> .env",
              "echo \"MYSQL_PASSWORD=${{ steps.vars.outputs.RDS_PASSWORD }}\" >> .env",
              "echo \"MYSQL_DATABASE=stocklive_db\" >> .env",
              "echo \"MYSQL_USER=admin\" >> .env",
              "sudo curl -sSL \"https://github.com/docker/compose/releases/download/v2.26.1/docker-compose-$(uname -s)-$(uname -m)\" -o /usr/local/bin/docker-compose",
              "sudo chmod +x /usr/local/bin/docker-compose",
              "sudo /usr/local/bin/docker-compose down || true",
              "sudo /usr/local/bin/docker-compose up -d --build",
              "sudo /usr/local/bin/docker-compose exec -T api python scripts/admin/create_user_serge.py || (sleep 20 && sudo /usr/local/bin/docker-compose exec -T api python scripts/admin/create_user_serge.py)"
            ]' \
            --region eu-west-3
