services:
  # La Base de Données (remplace WAMP)
  db:
    image: mysql:8.0
    container_name: stocklive-db
    restart: unless-stopped
    env_file: .env
    # ports section removed for security
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost", "-u", "root", "-p$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - db_data:/var/lib/mysql
      # On injecte tes schémas SQL ici pour l'init
      - ./init_db:/docker-entrypoint-initdb.d
    networks:
      - stocklive-network

  # Ton API FastAPI
  api:
    build: .
    container_name: stocklive-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    ports:
      - "8000:8000"
    networks:
      - stocklive-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  stocklive-network:
    driver: bridge

volumes:
  db_data:
